  <full_arrangement>
  A reference piece using a wide cross-section of features — `chord` + `voicing` + `dict`, `stack`, `bank`, `struct`, `mask`, `n` + `scale`/`mode`, `phaser`, `room`, `delay`, `shape`, `fm`, `lpf`, signal modulation, `ply`, `chunk`, `clip`, `anchor`, `segment`, `late`:

  ```js
  setcps(.75)

  let chords = chord("<Bbm9 Fm9>/4").dict('ireal')

  stack(
    // DRUMS
    stack(
      s("bd").struct("<[x*<1 2> [~@3 x]] x>"),
      s("~ [rim, sd:<2 3>]").room("<0 .2>"),
      n("[0 <1 3>]*<2!3 4>").s("hh"),
    ).bank('RolandTR909')
    .mask("<[0 1] 1 1 1>/16".early(.5)),

    // CHORDS
    chords.offset(-1).voicing().s("gm_epiano1:1")
      .phaser(4).room(.5),

    // BASS
    n("<0!3 1*2>").set(chords).mode("root:g2")
      .voicing().s("gm_acoustic_bass"),

    // MELODY
    chords.n("[0 <4 3 <2 5>>*2](<3 5>,8)")
      .anchor("D5").voicing()
      .segment(4).clip(rand.range(.4, .8))
      .room(.75).delay(.25)
      .lpf(sine.range(500, 1000).slow(8)).lpq(5)
      .rarely(ply("2")).chunk(4, fast(2))
      .gain(perlin.range(.6, .9))
      .mask("<0 1 1 0>/16")
  )
  .late("[0 .01]*4").late("[0 .01]*2")
  ```

