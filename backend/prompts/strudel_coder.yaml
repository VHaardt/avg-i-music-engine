  <dorian_arch>

  ```js
  // Arch contour in Eb dorian — climbs then falls, varied note lengths
  setcpm(96/4)
  $: n("0 2 4@2 6 5 3@2 1 0@3").scale("Eb3:dorian")
    .s("gm_flute").room(.5).gain(.7)
    .every(4, x => x.rev())

  $: n("<[0 -2]!2 [-3 -2]>").scale("Eb2:dorian")
    .s("gm_acoustic_bass").lpf(600)

  $: sound("bd(3,8), [~ cp]*2, hh(7,16)").bank("RolandR8").gain(.8)
