  $: n("<4 [3@3 4] [<2 0> ~@16] ~>")
    .scale("D4:minor").sound("gm_accordion:2")
    .room(2).gain(.4)

  $: n("[0 [~ 0] 4 [3 2] [0 ~] [0 ~] <0 2> ~]/2")
    .scale("D2:minor").sound("sawtooth,triangle").lpf(800)
