  <mixolydian_sparse>

  ```js
  // Sparse, wide-register, G mixolydian — call-and-response alternation
  setcpm(88/4)
  $: n("<[0@3 4 2] [- 5@2 - 3@3]>")
    .scale("G3:mixolydian")
    .s("gm_shakuhachi").room(.7).gain(.65)
    .iter(4)

  $: n("<0@2 -3 [-5 -3]>/2").scale("G2:mixolydian")
    .s("gm_cello").lpf(900).attack(.08)

  $: sound("<bd(3,8) bd(5,8)>, [~ cp]*2, hh?*8").bank("LinnDrum")
  ```

