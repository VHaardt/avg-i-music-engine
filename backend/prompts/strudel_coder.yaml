  <phrygian_zigzag>

  ```js
  // Zigzag contour in F# phrygian — alternating leaps, probabilistic hits
  setcpm(110/4)
  $: n("0 5? 1@2 6 2? 4 [0 3]@2").scale("F#3:phrygian")
    .s("gm_koto").delay(.25).room(.3)
    .sometimes(x => x.add(7))

  $: n("{0 -3 -5}%8").scale("F#2:phrygian")
    .s("gm_fretless_bass").lpf(700)

  $: sound("bd(5,8), [~ sd]*2, oh(3,8)").bank("AkaiMPC60")
