  </jazz_voicings>

  <euclidean_layered>

  ```js
  setcpm(120/4)
  $: s("bd").euclid(3, 8).bank("RolandTR909")
  $: s("cp").euclid(5, 8).bank("RolandTR909")
  $: s("hh").euclid(7, 16).bank("RolandTR909").gain(.6)
  $: note("c2").euclid(5, 8).s("sawtooth").lpf(400)
  ```

