  ```js
  setcpm(80/4)
  $: chord("<C^7 A7 Dm7 G7>").dict('ireal').voicing().s("gm_epiano1").room(.3)
  $: "<C^7 A7 Dm7 G7>".rootNotes(2).note().s("gm_acoustic_bass")
  $: s("hh*8").gain("[.4 1]*4")
