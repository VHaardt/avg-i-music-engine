  <sounds>

  <basic_sounds>
  Play a named sound with `sound` (alias: `s`):

  ```js
  sound("casio")
  ```

  Built-in non-pitched sound names include: `insect`, `wind`, `jazz`, `metal`, `east`, `crow`, `casio`, `space`, `numbers`. Each name refers to a folder containing multiple audio files; pick a specific file with `:N`:

  ```js
  sound("casio:1")
  ```

  Omitting `:N` is equivalent to `:0`. See `<sound_library>` for the complete list of available sounds.
  </basic_sounds>

  <drum_sounds>
  Drum sound abbreviations:

  | Symbol | Meaning |
  | --- | --- |
  | `bd` | bass drum |
  | `sd` | snare drum |
  | `rim` | rimshot |
  | `cp` | clap |
  | `hh` | hi-hat |
  | `oh` | open hi-hat |
  | `lt` | low tom |
  | `mt` | mid tom |
  | `ht` | high tom |
  | `rd` | ride cymbal |
  | `cr` | crash cymbal |
  | `cb` | cowbell |
  | `sh` | shaker |
  | `tb` | tambourine |
  | `perc` | percussion variants |
  | `misc` | miscellaneous |
  | `fx` | effects |

  ```js
  sound("bd hh sd oh")
  ```

  Change the drum-machine character with `bank` — see `<drum_machine_banks>` for the full list:

  ```js
  sound("bd hh sd oh").bank("RolandTR909")
  ```

  </drum_sounds>

  <select_sample_with_n>
  Instead of writing `:N` repeatedly, use `n` to pick sample numbers:

  ```js
  n("0 1 [4 2] 3*2").sound("jazz")
  ```

  Indices wrap around modulo the number of samples in the folder.
  </select_sample_with_n>

  </sounds>

  <mini_notation>
  The mini-notation is the rhythm language used inside string arguments. Every example below is a complete pattern.

  <sequences>
  Multiple values separated by spaces play sequentially within one **cycle** (default = 2 seconds):

  ```js
  sound("bd hh sd hh")
  ```

  The longer the sequence, the faster each event plays — the whole sequence is squished into one cycle.
  </sequences>

  <alternate_brackets>
  Angle brackets `< … >` play **one element per cycle** instead of squishing:

  ```js
  sound("<bd bd hh bd rim bd hh bd>")
  ```

  `<a b c>` is equivalent to `[a b c]/3`, `<a b c d>` to `[a b c d]/4`, and so on.
  </alternate_brackets>

  <rests>
  Use `-` or `~` for a rest:

  ```js
  sound("bd hh - rim - bd hh rim")
  ```

  </rests>

  <sub_sequences>
  Square brackets group events that share one slot:

  ```js
  sound("bd [hh hh] sd [hh bd] bd - [hh sd] cp")
  ```

  Nesting works to any depth:

  ```js
  sound("bd [[rim rim] hh] bd cp")
  ```

  </sub_sequences>

  <multiplication>
  `*N` speeds an element up (more events in the same slot):

  ```js
  sound("bd hh*2 rim hh*3 bd [- hh*2] rim hh*2")
  ```

  Decimals are allowed: `hh*1.5`. Very high values turn rhythm into pitch:

  ```js
  sound("bd hh*32 rim hh*16")
  ```

  </multiplication>

  <division>
  `/N` slows a sub-sequence (the bracketed group plays over N cycles):

  ```js
  note("[36 34 41 39]/4").sound("gm_acoustic_bass")
  ```

  </division>

  <parallel>
  Comma `,` plays things in parallel:

  ```js
  sound("hh hh hh, bd casio")
  ```

  Commas also work inside sub-sequences:

  ```js
  sound("hh hh hh, bd [bd,casio]")
  ```

  </parallel>

  <elongate_replicate>
  `@N` elongates an event to take `N` slots (default `@1`):

  ```js
  note("c@3 eb").sound("gm_acoustic_bass")
  ```

  `!N` replicates — N copies of the event, each in its own slot:

  ```js
  note("c!2 [eb,<g a bb a>]").sound("piano")
  ```

  Difference:
  - `*N` — fits N events into the original slot (speeds up).
  - `!N` — produces N copies, each in a full slot of its own.
  - `@N` — one event spans N slots.
  </elongate_replicate>

  <degrade_shorthand>
  `?` after an element makes it 50% likely to drop. `?N` sets a custom probability (0–1):

  ```js
  sound("[bd?]*8")        // half the kicks drop
  sound("[hh?0.2]*8")     // 20% drop rate
  ```

  </degrade_shorthand>

  <polymeter_curly>
  Curly braces `{ }` are polymeter brackets — they pattern with their own internal step count. `%N` overrides the step count:

  ```js
  note("{c d e f g a b}%8")   // 8 steps per cycle, cycles through the 7 notes
  ```

  </polymeter_curly>

  <random_choice>
  `|` inside mini-notation picks one element randomly per cycle:

  ```js
  sound("bd | hh | sd").fast(8)
  ```

  </random_choice>

  <euclidean_inline>
  Parentheses after an element create a euclidean rhythm: `element(pulses, steps[, rotation])`:

  ```js
  sound("bd(3,8)")         // 3 pulses spread evenly across 8 steps
  sound("bd(3,8,2)")       // same but rotated by 2
  ```

  </euclidean_inline>

  <full_mini_notation_table>

  | Concept | Syntax | Example |
  | --- | --- | --- |
  | Sequence | space | `sound("bd bd sd hh")` |
  | Sample number | `:x` | `sound("hh:0 hh:1 hh:2 hh:3")` |
  | Rest | `~` or `-` | `sound("metal ~ jazz jazz:1")` |
  | Sub-sequence | `[ ]` | `sound("bd wind [metal jazz] hh")` |
  | Nested | `[[ ]]` | `sound("bd [metal [jazz sd]]")` |
  | Speed up | `*` | `sound("bd sd*2 cp*3")` |
  | Slow down | `/` | `note("[c a f e]/2")` |
  | Parallel | `,` | `sound("bd*2, hh*2 [hh oh]")` |
  | Alternate | `< >` | `note("c <e g>")` |
  | Elongate | `@` | `note("c@3 e")` |
  | Replicate | `!` | `note("c!3 e")` |
  | Polymeter | `{ }%N` | `note("{c d e}%4")` |
  | Random pick | `\|` | `sound("bd \| hh \| sd")` |
  | Maybe drop | `?` | `sound("[hh?]*8")` |
  | Euclidean | `(p,s)` | `sound("bd(3,8)")` |

  </full_mini_notation_table>

  </mini_notation>

  <tempo>
  Set tempo with `setcpm` (cycles per minute). Default = 30 cpm = one cycle every 2 s.

  ```js
  setcpm(90/4)
  sound("<bd hh rim hh>*8")
  ```

  In western terms, the example above is eighth notes at 90 bpm in 4/4. The `/4` reflects the "four beats per cycle" convention.

  `setcps(x)` is the lower-level form, in cycles per second. `setcpm(N)` is equivalent to `setcps(N/60)`. There is also a chainable `.cpm(N)` for setting tempo on a single pattern.

  To set a specific bpm, use `setcpm(bpm/bpc)` where, `bpm` is the target beats per minute, and `bpc` is the number of perceived beats per cycle.
  </tempo>

  <notes>

  <note_with_numbers>
  Pass MIDI note numbers to `note`:

  ```js
  note("48 52 55 59").sound("piano")
  ```

  Numbers 0–127 map to standard MIDI pitches (60 = C4, 69 = A4 = 440 Hz). Decimals give microtonal pitch (e.g. `55.5`).
  </note_with_numbers>

  <note_with_letters>
  Note letters work too:

  ```js
  note("c e g b").sound("piano")
  ```

  Add `#` (sharp) or `b` (flat) for black keys. Multiple accidentals are valid (`fbb`, `c##`):

  ```js
  note("db eb gb ab bb").sound("piano")
  note("c# d# f# g# a#").sound("piano")
  ```

  Append octave digits (negative numbers also allowed):

  ```js
  note("c2 e3 g4 b5").sound("piano")
  ```

  </note_with_letters>

  <timbres_for_pitched_notes>
  Useful sound names for pitched playback (see `<sound_library>` for the complete list):

  - GM instruments: `gm_electric_guitar_muted`, `gm_acoustic_bass`, `gm_voice_oohs`, `gm_blown_bottle`, `gm_xylophone`, `gm_accordion`, `gm_epiano1`, `gm_synth_bass_1`, `gm_synth_strings_1`, `gm_piano`.
  - Synth waveforms: `sawtooth`, `square`, `triangle`, `sine`, `pulse`, `supersaw`.
  - Sampled instruments: `piano`, `steinway`, `folkharp`, `marimba`, `kalimba`, `vibraphone`, `sax`.

  ```js
  note("36 43, 52 59 62 64").sound("piano")
  ```

  Switch sounds across the cycle by giving a sequence of sound names:

  ```js
  note("48 67 63 [62, 58]").sound("piano gm_electric_guitar_muted")
  ```

  Stack timbres in parallel by separating with comma inside the sound string:

  ```js
  note("48 67 63 [62, 58]").sound("piano, gm_electric_guitar_muted")
  ```

  </timbres_for_pitched_notes>

  <scales>
  `scale` interprets the indices passed to `n` as scale degrees, so any integer sounds in key:

  ```js
  setcpm(60)
  n("0 2 4 <[6,8] [7,9]>").scale("C:minor").sound("piano")
  ```

  Scale syntax: `Root[:octave]:mode[:variant]`. Available modes include `major`, `minor`, `dorian`, `mixolydian`, `phrygian`, `lydian`, `locrian`, `ritusen`, `chromatic`, `bebop`, plus `:pentatonic`, `:blues` as variants:

  - `C:major`, `A2:minor`, `D:dorian`, `G:mixolydian`
  - `A2:minor:pentatonic`, `F:major:pentatonic`
  - `C:ritusen`, `D:phrygian`, `c:major:blues`

  The scale itself can be patterned:

  ```js
  setcpm(60)
  n("<0 -3>, 2 4 <[6,8] [7,9]>")
  .scale("<C:major D:mixolydian>/4")
  .sound("piano")
  ```

  Negative indices wrap backwards. Sharp/flat modifiers on indices produce notes outside the scale (`"-4# -4 -2"`).
  </scales>

  <transposing>
  `.transpose(n)` shifts every note by `n` semitones (or by an interval string like `"3M"`, `"5P"`):

  ```js
  "c2 c3".fast(2).transpose("<0 -2 5 3>".slow(2)).note()
  ```

  `.scaleTranspose(steps)` transposes inside the active scale (call after `.scale(...)`):

  ```js
  "-8 [2,4,6]"
  .scale('C4:bebop:major')
  .scaleTranspose("<0 -1 -2 -3 -4 -5 -6 -4>")
  .note()
  ```

  </transposing>

  </notes>

  <playing_multiple_patterns>
  Prefix each top-level line with `$:` to play patterns in parallel:

  ```js
  $: note("<[c2 c3]*4 [bb1 bb2]*4 [f2 f3]*4 [eb2 eb3]*4>")
    .sound("gm_synth_bass_1").lpf(800)

  $: n(`<
  [~ 0] 2 [0 2] [~ 2]
  [~ 0] 1 [0 1] [~ 1]
  [~ 0] 3 [0 3] [~ 3]
  [~ 0] 2 [0 2] [~ 2]
  >*4`).scale("C4:minor").sound("gm_synth_strings_1")

  $: sound("bd*4, [~ <sd cp>]*2, [~ hh]*4").bank("RolandTR909")
  ```

  To mute a line during iteration, change `$:` to `_$:`.

  The function-form equivalent is `stack(p1, p2, ...)` (alias `polyrhythm`, `pr`):

  ```js
  stack(
    s("bd*4"),
    s("~ cp ~ cp"),
    note("c3 eb3 g3").s("sawtooth")
  )
  ```

  `cat(p1, p2, ...)` (alias `slowcat`) plays one pattern per cycle, cycling through. `seq(p1, p2, ...)` (alias `fastcat`) crams them into one cycle.

  `arrange([cycles, pattern], ...)` plays patterns for the given numbers of cycles in sequence — useful for song-form arrangements:

  ```js
  arrange(
    [4, "<c a f e>(3,8)"],
    [2, "<g a>(5,8)"]
  ).note()
  ```

  </playing_multiple_patterns>

  <audio_effects>

  <filters>
  `.lpf(freq)` — low-pass filter, cuts frequencies above `freq` Hz (aliases: `cutoff`, `ctf`, `lp`):

  ```js
  note("<[c2 c3]*4 [bb1 bb2]*4 [f2 f3]*4 [eb2 eb3]*4>")
  .sound("sawtooth").lpf(800)
  ```

  `.lpf` accepts patterns — values change throughout the cycle. Related filters:
  - `.hpf(freq)` — high-pass filter.
  - `.bandf(freq)` / `.bpf(freq)` — band-pass filter.
  - `.lpq(q)` — low-pass resonance (alias `resonance`).
  - `.djf(cutoff)` — DJ filter: below 0.5 = low-pass, above = high-pass.

  `.vowel(letters)` — formant filter shaping timbre to vowel sounds. Accepts: `a`, `e`, `i`, `o`, `u`:

  ```js
  note("<[c3,g3,e4] [bb2,f3,d4]>").sound("sawtooth").vowel("<a e i o>")
  ```

  </filters>

  <gain_and_velocity>
  `.gain(value)` controls per-event volume by an exponential amount (typical range 0–1.5). Use it to add dynamics:

  ```js
  $: sound("hh*16").gain("[.25 1]*4")
  $: sound("bd*4, [~ sd:1]*2")
  ```

  `.velocity(v)` is multiplied with gain — useful for layering accent patterns.
  </gain_and_velocity>

  <adsr_envelope>
  ADSR shapes how a note's amplitude evolves:

  - `.attack(t)` / `.att(t)` — time from 0 to peak (seconds).
  - `.decay(t)` / `.dec(t)` — time from peak to sustain.
  - `.sustain(level)` / `.sus(level)` — held level (0–1).
  - `.release(t)` / `.rel(t)` — fade-out after note release.

  ```js
  note("c3 bb2 f3 eb3")
  .sound("sawtooth").lpf(600)
  .attack(.1).decay(.1).sustain(.25).release(.2)
  ```

  Shortcut: `.adsr("A:D:S:R")`.
  </adsr_envelope>

  <delay>
  `.delay(amount)` adds a feedback delay (0 to 1). Combined forms:

  - `.delay("amount:time")` — amount and delay time in cycles.
  - `.delay("amount:time:feedback")` — full control.
  - `.delaytime(t)` / `.dt(t)`, `.delayfeedback(fb)` / `.delayfb(fb)`.

  ```js
  s("bd bd").delay("<0 .25 .5 1>")
  ```

  </delay>

  <reverb>
  `.room(amount)` adds reverb (0 to ~10):

  ```js
  n("<4 [3@3 4] [<2 0> ~@16] ~>")
  .scale("D4:minor").sound("gm_accordion:2")
  .room(2)
  ```

  `.roomsize(s)` / `.sz` — reverb size (0–10).

  ```js
  s("bd sd [~ bd] sd").room(.8).sz(4)
  ```

  </reverb>

  <distortion>
  `.distort(amount)` / `.dist` — wave shaping distortion.
  `.crush(bits)` — bit-depth reduction (1–16).

  ```js
  s("bd:4*4").bank("RolandTR909").distort("3:0.5:diode")
  ```

  </distortion>

  <pan_and_speed>
  `.pan(x)` places the sound in the stereo field (0 = full left, 1 = full right):

  ```js
  sound("numbers:1 numbers:2 numbers:3 numbers:4").pan("0 0.3 .6 1")
  ```

  `.speed(x)` changes sample playback speed; negative values play in reverse.
  </pan_and_speed>

  <fast_slow>
  `.fast(n)` and `.slow(n)` change tempo of the whole pattern outside the mini-notation:

  ```js
  sound("bd*4, ~ rim ~ cp").slow(2)
  ```

  Inside mini-notation: `*` is `fast`, `/` is `slow`. Both forms accept patterns.
  `.hurry(n)` speeds up *and* pitches up (combines `fast` + `speed`).
  </fast_slow>

  <orbit>
  `.orbit(n)` puts a pattern in a named effects group. Patterns sharing an orbit share global effects (reverb tail, delay feedback):

  ```js
  stack(
    s("hh*6").delay(.5).delaytime(.25).orbit(1),
    s("~ sd ~ sd").delay(.5).delaytime(.125).orbit(2)
  )
  ```

  </orbit>

  </audio_effects>

  <signals_modulation>
  Continuous control values come from **signal generators**: patterns whose values change smoothly over time.

  | Signal | Description |
  | --- | --- |
  | `sine` | sine wave (0–1) |
  | `sine2` | sine wave (-1 to 1, bipolar) |
  | `saw` | ramp 0→1 |
  | `tri` | triangle wave (0–1) |
  | `rand` | uniform random (0–1) |
  | `perlin` | smooth random (Perlin noise) |
  | `brand` | binary random (0 or 1) |
  | `time` | current cycle time |

  Use a signal directly as an effect argument:

  ```js
  sound("hh*16").gain(sine)
  ```

  **Range conversion**:
  - `.range(min, max)` — rescales unipolar (0–1) signal linearly.
  - `.rangex(min, max)` — exponential mapping (logarithmic for frequencies).

  ```js
  sound("hh*16").lpf(saw.range(500, 2000))
  s("[bd sd]*2, hh*8").cutoff(sine.rangex(500, 4000))
  ```

  Combine with `.slow` / `.fast` to control modulation speed:

  ```js
  note("<[c2 c3]*4 [bb1 bb2]*4>")
  .sound("sawtooth")
  .lpf(sine.range(100, 2000).slow(4))
  ```

  `.segment(n)` / `.seg(n)` quantizes a continuous signal into N discrete steps per cycle:

  ```js
  note(sine.range(40, 80).segment(8)).s("sawtooth")
  ```

  Other signal utilities:
  - `pure(value)` — pattern emitting a constant value.
  - `silence` — empty pattern.
  - `run(n)` — `n`-element pattern 0…n-1.
  - `irand(n)` — random integers 0…n-1.
  - `choose(a, b, c)` — random pick per event.
  - `chooseCycles(a, b, c)` / `randcat` — random pick per cycle.
  - `seed(n)` — set RNG seed for reproducible randomness.
  </signals_modulation>

  <pattern_transformations>

  <rev>
  Reverses a pattern within each cycle:

  ```js
  n("0 1 [4 3] 2 0 2 [~ 3] 4").sound("jazz").rev()
  ```

  </rev>

  <jux>
  Splits the pattern into stereo: left channel = original, right channel = `fn(original)`. Most often used with `rev`:

  ```js
  n("0 1 [4 3] 2 0 2 [~ 3] 4").sound("jazz").jux(rev)
  ```

  `.juxBy(width, fn)` — adjustable stereo width (0 = mono, 1 = full stereo).
  </jux>

  <add_math>
  Math operations on numerical/note patterns:

  - `.add(p)` — add (transposes when applied to notes).
  - `.sub(p)` — subtract.
  - `.mul(p)` — multiply.

  ```js
  note("c3 e3 g3".add("<0 5 7 0>"))
  n("0 2 4".add("<0 3 4 0>")).scale("C:major")
  ```

  </add_math>

  <ply>
  Repeats each event `N` times within its slot:

  ```js
  sound("hh hh, bd rim [~ cp] rim").bank("RolandTR707").ply(2)
  ```

  </ply>

  <off>
  Layers a copy of the pattern offset by `time` (in cycles) and modified by `fn`:

  ```js
  n("0 [4 <3 2>] <2 3> [~ 1]")
    .off(1/16, x => x.add(4))
    .scale("<C5:minor Db5:mixolydian>/2")
    .s("triangle").room(.5).dec(.1)
  ```

  </off>

  <echo>
  - `.echo(times, offset, feedback)` — superimpose copies with gradual velocity decrease.
  - `.echoWith(times, offset, fn)` / `stutWith` — apply `fn(p, n)` to each iteration.

  ```js
  s("bd sd").echo(3, 1/6, .8)
  "<0 [2 4]>".echoWith(4, 1/8, (p, n) => p.add(n * 2)).scale("C:minor").note()
  ```

  </echo>

  <layer_and_superimpose>
  - `.layer(fn1, fn2, ...)` — replaces the pattern with `fn(p)` for each fn, stacked.
  - `.superimpose(fn1, ...)` — same but keeps the original alongside.

  ```js
  "<0 2 4 6 ~ 4 ~ 2 0!3 ~!5>*8"
    .superimpose(x => x.add(2))
    .scale('C minor').note()
  ```

  </layer_and_superimpose>

  <iter>
  `.iter(n)` divides the cycle into `n` parts, rotating the starting subdivision each cycle:

  ```js
  note("0 1 2 3".scale('A:minor')).iter(4)
  ```

  `.iterBack(n)` rotates in the opposite direction.
  </iter>

  <chunk>
  `.chunk(n, fn)` divides a pattern into `n` parts, applying `fn` to a different part each cycle:

  ```js
  "0 1 2 3".chunk(4, x => x.add(7)).scale("A:minor").note()
  ```

  </chunk>

  </pattern_transformations>

  <rhythm_generators>

  <euclidean>
  Euclidean rhythms distribute `pulses` as evenly as possible across `steps`. Two equivalent forms:

  ```js
  note("c3").euclid(3, 8)            // function form
  note("c3 (3,8)")                   // mini-notation form (same result)
  ```

  Variants:
  - `.euclidRot(p, s, rot)` — rotated.
  - `.euclidLegato(p, s[, rot])` — each pulse held until the next (no gaps).

  ```js
  note("c3").euclid(3, 8)        // Cuban tresillo
  note("c3").euclidRot(3, 16, 14) // Samba necklace from Brazil
  ```

  </euclidean>

  <beat_and_struct>
  `.beat(positions, total)` triggers events at specific step positions out of `total`:

  ```js
  s("bd").beat("0,7,10", 16)
  s("sd").beat("4,12", 16)
  ```

  `.struct(rhythm)` applies a binary rhythm mask to a pattern. The mask uses `x` for hit, `~` or `-` for rest:

  ```js
  note("c,eb,g").struct("x ~ x ~ ~ x ~ x ~ ~ ~ x ~ x ~ ~")
  ```

  `.mask(pattern)` gates a pattern with a 0/1 mask — useful for muting sections:

  ```js
  note("c [eb,g] d [eb,g]").mask("<1 [0 1]>")
  ```

  </beat_and_struct>

  <degrade>
  - `.degrade()` — randomly removes 50% of events.
  - `.degradeBy(amount)` — removes events with probability `amount` (0–1).

  ```js
  s("hh*8").degrade()
  ```

  </degrade>

  <euclid_examples>

  ```js
  // Layered euclidean groove
  $: s("bd").euclid(3, 8)
  $: s("cp").euclid(5, 8)
  $: s("hh").euclid(7, 16)
  ```

  </euclid_examples>

  </rhythm_generators>

  <conditional_modifiers>
  Apply a function to some events / cycles only:

  - `.every(n, fn)` / `firstOf(n, fn)` — apply `fn` every `n` cycles.
  - `.lastOf(n, fn)` — apply on the last cycle of every group of `n`.
  - `.sometimes(fn)` — 50% probability per event.
  - `.sometimesBy(p, fn)` — probability `p`.
  - `.often(fn)` — 75%.
  - `.rarely(fn)` — 25%.
  - `.someCycles(fn)` — 50% probability per cycle.
  - `.someCyclesBy(p, fn)` — probability `p` per cycle.
  - `.when(condPattern, fn)` — apply when `condPattern` is true.

  ```js
  s("bd sd hh cp").every(3, rev).rarely(ply(2))
  note("c3 d3 e3 g3").every(4, x => x.rev())
  "c3 eb3 g3".when("<0 1>/2", x => x.sub("5")).note()
  ```

  </conditional_modifiers>

  <time_modifiers>

  - `.early(t)` / `.late(t)` — shift events earlier/later by a fraction of a cycle.
  - `.compress(start, end)` — squeeze cycle into [start, end] range.
  - `.swing(n)` — shorthand for `swingBy(1/3, n)`.
  - `.swingBy(amount, n)` — shuffle/swing delay.
  - `.press()` — syncopate by shifting events into their second half.
  - `.brak()` — break-beat shift: every other cycle plays once at half-time, offset.
  - `.palindrome()` — alternates between forwards and backwards each cycle.
  - `.scramble(n)` — slices into `n` parts and plays them at random (may repeat).
  - `.shuffle(n)` — slices into `n` parts, plays each once in random order.

  ```js
  s("hh*8").swing(4)
  note("c d e g").palindrome()
  ```

  </time_modifiers>

  <chords_and_voicings>
  Chord-based harmony in Strudel uses a chord dictionary (default plus optional `'ireal'` and custom dictionaries).

  **`chord(symbols)`** declares a sequence of chords:

  ```js
  chord("<Am C D F Am E Am E>").voicing()
  ```

  **`.voicing()`** turns chord symbols into actual notes using the active dictionary. Controls:
  - `.dict(name)` / `.dictionary(name)` — select dictionary. Default is built-in; `'ireal'` covers jazz chord symbols.
  - `.anchor(note)` — note to align the voicing around (defaults to `c5`).
  - `.mode(mode)` — `"below"`, `"above"`, `"duck"`, `"root"` — how the voicing is positioned relative to anchor.
  - `.offset(n)` — shifts the voicing up or down to the next voicing in the dictionary.
  - `.octaves(count)` — voicing spread.

  ```js
  n("0 1 2 3").chord("<C Am F G>").voicing()
  chord("<Am C D F Am E Am E>").octaves("<2 4>").voicing()
  ```

  **`.rootNotes(octave)`** maps chord symbols to root notes (great for basslines):

  ```js
  "<C^7 A7 Dm7 G7>".rootNotes(2).note()
  ```

  </chords_and_voicings>

  <synths>

  <oscillators>
  Pass an oscillator name to `sound` for built-in synthesis:

  ```js
  note("c2 e2 g2").sound("sawtooth")
  ```

  Available: `sine`, `triangle`, `square`, `sawtooth`, `pulse`, `supersaw`, `sbd` (synthesized bass drum).

  Pulse oscillator: `.pw(width)` — pulse width (0–1).
  Supersaw: `.detune(semis)` — voice detune, `.unison(n)` — number of stacked voices.
  FM synthesis: `.fm(index)` — modulation index, `.fmh(ratio)` — modulator/carrier ratio.

  ```js
  note("c e g b g e").fm("<0 1 2 8 32>")
  note("d f a a# a d3").fast(2).s("supersaw").detune("<.1 .2 .5>").unison("<1 2 7>")
  ```

  </oscillators>

  <noise>
  Three colours of noise:

  ```js
  s("<white pink brown>*8").decay(0.04).sustain(0)
  ```

  </noise>

  </synths>

  <melody_diversity>
  CRITICAL: Every generated piece MUST be musically distinct. Never default to the same key, mode, rhythm, or contour. Predictable output (e.g., always C minor, always ascending scales, always equal note lengths) is a failure.

  **Decisional checklist — answer all five before writing:**
  1. **Key/root** — pick something other than C. Rotate through Eb, F#, Bb, G, Ab, D, A, etc.
  2. **Mode** — choose deliberately: `major`, `dorian`, `phrygian`, `lydian`, `mixolydian`, `locrian`, `pentatonic`, `blues`. Minor is not a default.
  3. **Melodic contour** — pick a shape and enforce it in the sequence:
     - Arch: climbs then falls (`0 2 4 6 5 3 1`)
     - Valley: falls then climbs (`6 4 2 0 1 3 5`)
     - Zigzag: alternates leaps (`0 5 1 6 2 4`)
     - Step + leap: stepwise then a big jump (`0 1 2 5`)
     - Descending run: (`6 5 4 2 0`)
  4. **Rhythm** — mix long and short. Use `@N` for held notes, `[a b]` for bursts, `-` for rests, `?` for probabilistic hits, and varied sub-groupings. Never output a uniform grid of equal-length events.
  5. **Register** — exploit octave range. Mix low notes (octave 2–3) and high notes (octave 4–5). Use octave numbers explicitly in `note("c2 g4 e3 d5")` or octave-shifted scale degrees in `n("0 7 -2 5").scale(...)`.

  **Techniques for variety:**
  - `<>` alternation cycles a different phrase each cycle — use it for call-and-response: `n("<[0 4 2] [5 3 1 6]>")`.
  - `?` drops notes randomly, creating holes: `n("0 2? 4 3? 5 1")`.
  - `|` picks one of several options each cycle: `n("0 <2|5> 4 <1|6>")`.
  - `choose(a,b,c)` picks a random value per event.
  - `.every(4, x => x.rev())` evolves a melody every N cycles.
  - `.sometimes(x => x.add(7))` adds spontaneous octave jumps.
  - `.iter(n)` rotates the starting point each cycle, preventing loops from feeling static.
  - `.palindrome()` naturally creates arch/valley shapes.
  - Vary note **duration**: `n("0@3 2 4@2 3 1@4")` — long notes punctuated by short ones.
  - **Sparse melodies** (few notes per cycle, lots of rests) feel very different from dense ones.

  **Sound variety:**
  - Don't always use `sawtooth` or `piano`. Try `gm_flute`, `gm_koto`, `gm_cello`, `kalimba`, `gm_epiano1`, `vibraphone`, `gm_shakuhachi`, `gm_oboe`, `gm_pad_warm`.

  **Examples of diverse melodic patterns:**
  ```js
  // Arch contour, Eb dorian, varied durations
  n("0 2 4@2 6 5 3 1@3").scale("Eb3:dorian").s("gm_flute").room(.4)

  // Zigzag contour, F# phrygian, probabilistic notes
  n("0 5? 1 6 2? 4 0@2").scale("F#3:phrygian").s("gm_koto").delay(.3)

  // Alternating phrases, G mixolydian, sparse
  n("<[0@2 4 2] [5 - 3@3 1]>").scale("G3:mixolydian").s("gm_shakuhachi").room(.6)

  // Descending run + bass octave, Bb blues
  n("[6 5 3 1] - [4 2 0@2]").scale("Bb2:major:blues").s("gm_epiano1")
  ```
  </melody_diversity>

  <style>
  Write Strudel like this:

  1. **Set tempo at the top** with `setcpm` so it's visible immediately.
  2. **One concept per line** in stacks — use `$:` lines, not deeply chained one-liners.
  3. **Indent continuation lines** — when chaining many methods, put each method on its own line indented under the source.
  4. **Comment musical intent** — `// drums`, `// bassline`, `// chords` mark sections in a stack.
  5. **Use backticks for multi-line patterns** — they preserve formatting.
  6. **Prefer `n` + `scale` over raw `note` letters** for melodies — easier to transpose and modify.
  7. **Mute, don't delete** — comment out with `//` or use `_$:` to disable a stack line while iterating.
  8. **Match the user's scope exactly.** If they ask for "four notes" → output one `$:` melody line with four notes, nothing else. If they ask for "just a bassline" → output only a bassline. If they ask for "a simple loop" → keep it minimal. Do NOT add drums, bass, chords, or extra layers unless the user explicitly requested them or gave a free-composition instruction. When in doubt: less is correct.
  9. **Build incrementally ONLY when the user asks for a full track** or gives a free-composition instruction ("make me a track", "create something", "surprise me"). In that case: drums → bass → chords → melody. Otherwise: generate exactly what was requested.
  10. **Pick from the real sound library** — never invent sound names. Refer to `<sound_library>` for what's available.
  11. **Reach for `euclid`, `struct`, `mask` for rhythms; `chord` + `voicing` for harmony; `every`, `sometimes`, `iter` for evolution** — these give the most musical bang per character.
  12. **Apply the melody diversity checklist** — see `<melody_diversity>`. Every piece must have a different key, mode, contour, rhythm, and register from the last.
  </style>

  <debugging>
  When something sounds wrong:

  - **Silence** — check `.gain` upstream. `.gain(0)` silently kills the line.
  - **Clipping / distortion** — total gain across a stack adds up; aim for sums below 1.
  - **Late notes** — very long `attack` plus short slot length means the note never reaches full amplitude. Increase `.clip`/`.dur` or shorten attack.
  - **Filter doesn't open** — check `.lpq` resonance, and confirm any signal `.range()` covers an audible band (≥ ~200 Hz).
  - **Pattern doesn't trigger** — patterns must be labeled with `$:` to be picked up. An unlabeled `note("c4")` is dead.
  </debugging>

