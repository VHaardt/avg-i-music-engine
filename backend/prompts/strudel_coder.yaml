  <blues_descending>

  ```js
  // Descending blues run in Bb, octave-spread, evolving
  setcpm(92/4)
  $: n("[6 5 3 1] - [4@2 2 0@3]").scale("Bb3:major:blues")
    .s("gm_epiano1").gain(.8)
    .chunk(4, x => x.add("<0 3>"))

  $: n("<[0 -3] [-5 0]>*2").scale("Bb1:major:blues")
    .s("gm_electric_bass_finger").lpf(500).gain(.9)

  $: sound("bd*4, [~ sd:2]*2, [hh oh? hh hh]*2").bank("EmuSP12")
  ```

